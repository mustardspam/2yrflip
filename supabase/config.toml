# Minimal Supabase config for the buybox Edge Function.
# `supabase link` / `supabase init` will expand this; the [functions] block
# below is what matters for deploying buybox.

project_id = "2yrflip"

[functions.buybox]
# verify_jwt MUST be false for browser calls: with it on, Supabase's gateway
# rejects the CORS preflight (browsers don't send Authorization on OPTIONS) with
# "UNAUTHORIZED_NO_AUTH_HEADER", so the real request never fires. Security is not
# lost — the function enforces its own passcode (x-app-pass vs APP_PASSCODE) and
# the anon key is public anyway. The hard monthly cap + cache still gate cost.
verify_jwt = false
